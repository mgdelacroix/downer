          const candidate = children[Math.min(offset, children.length - 1)] || children[offset - 1] || node;
          const textNode = candidate.nodeType === Node.TEXT_NODE ? candidate : document.createTreeWalker(candidate, NodeFilter.SHOW_TEXT).nextNode();
          if (textNode) return sourceOffsetFromBoundary(textNode, 0);
          const element = candidate.nodeType === Node.ELEMENT_NODE ? candidate.closest("[data-start][data-end]") : null;
          if (element) return Number(element.dataset.start);
        }
        return null;
      }

      function captureSelection() {
        const documentElement = document.getElementById("document");
        const selection = window.getSelection();
        if (!documentElement || !selection || selection.rangeCount === 0 || selection.isCollapsed) return;
        if (!documentElement.contains(selection.anchorNode) || !documentElement.contains(selection.focusNode)) return;
        const range = selection.getRangeAt(0);
        const rect = range.getBoundingClientRect();
        const start = sourceOffsetFromBoundary(range.startContainer, range.startOffset);
        const end = sourceOffsetFromBoundary(range.endContainer, range.endOffset);
        if (start === null || end === null) return;
        const normalized = { start: Math.min(start, end), end: Math.max(start, end) };
        const text = state.markdown.slice(normalized.start, normalized.end);
        if (!text.trim()) return;
        state.selectionDraft = {
          ...normalized,
          text,
          composing: false,
          error: "",
          x: rect.left + rect.width / 2,
          y: rect.top
        };
        const scrollX = window.scrollX;
        const scrollY = window.scrollY;
        renderWorkspace();
        window.scrollTo(scrollX, scrollY);
      }

      function activateComment(id, scrollTarget = "highlight") {
        if (state.activeCommentId !== id) {
          state.confirmDeleteId = null;
          state.replyComposerId = null;
          state.replyDraftError = "";
        }
        state.activeCommentId = id;
        if (window.matchMedia && window.matchMedia("(max-width: 760px)").matches) {
          state.commentsDrawerOpen = true;
        }
        renderWorkspace();
        requestAnimationFrame(() => {
          const selector = scrollTarget === "card" ? `[data-comment-id="${CSS.escape(id)}"]` : `[data-highlight-ids~="${CSS.escape(id)}"]`;
          const target = document.querySelector(selector);
          target?.scrollIntoView({ block: "center", behavior: "smooth" });
          target?.focus?.({ preventScroll: true });
        });
      }

      function bindCommentInteractions() {
        const documentElement = document.getElementById("document");
        documentElement.addEventListener("mouseup", () => setTimeout(captureSelection, 0));
        documentElement.addEventListener("keyup", () => setTimeout(captureSelection, 0));
        documentElement.addEventListener("click", (event) => {
          const highlight = event.target.closest("[data-highlight-ids]");
          if (!highlight) return;
          const id = highlight.dataset.highlightIds.split(" ")[0];
          activateComment(id, "card");
        });
        documentElement.addEventListener("keydown", (event) => {
          if (event.key !== "Enter" && event.key !== " ") return;
          const highlight = event.target.closest("[data-highlight-ids]");
          if (!highlight) return;
          event.preventDefault();
          const id = highlight.dataset.highlightIds.split(" ")[0];
          activateComment(id, "card");
        });
        document.querySelectorAll("[data-comment-id]").forEach((card) => {
          card.addEventListener("click", () => activateComment(card.dataset.commentId, "highlight"));
        });
        document.querySelectorAll("[data-reply-id]").forEach((button) => {
          if (button.classList.contains("reply-comment")) {
            button.addEventListener("click", () => requestReply(button.dataset.replyId));
          }
        });
        document.querySelectorAll("[data-cancel-reply-id]").forEach((button) => {
          button.addEventListener("click", () => cancelReply(button.dataset.cancelReplyId));
        });
        document.querySelectorAll("[data-save-reply-id]").forEach((button) => {
          button.addEventListener("click", () => addReply(button.dataset.saveReplyId, document.getElementById("reply-body")?.value || ""));
        });
        document.getElementById("reply-body")?.addEventListener("keydown", (event) => {
          if (event.key === "Enter" && (event.ctrlKey || event.metaKey)) {
            event.preventDefault();
            addReply(state.replyComposerId, event.target.value);
          }
        });
        document.querySelectorAll("[data-resolve-id]").forEach((button) => {
          button.addEventListener("click", () => resolveComment(button.dataset.resolveId));
        });
        document.querySelectorAll("[data-reopen-id]").forEach((button) => {
          button.addEventListener("click", () => reopenComment(button.dataset.reopenId));
        });
        document.querySelectorAll("[data-delete-id]").forEach((button) => {
          button.addEventListener("click", () => requestDeleteComment(button.dataset.deleteId));
        });
        document.querySelectorAll("[data-cancel-delete-id]").forEach((button) => {
          button.addEventListener("click", () => cancelDeleteComment(button.dataset.cancelDeleteId));
        });
        document.querySelectorAll("[data-confirm-delete-id]").forEach((button) => {
          button.addEventListener("click", () => deleteComment(button.dataset.confirmDeleteId));
        });
        document.getElementById("start-comment")?.addEventListener("click", () => {
          state.selectionDraft.composing = true;
          state.selectionDraft.error = "";
          renderWorkspace();
          requestAnimationFrame(() => {
            window.scrollTo(0, 0);
            document.getElementById("comment-body")?.focus();
          });
        });
        document.getElementById("clear-selection")?.addEventListener("click", () => {
          state.selectionDraft = null;
          window.getSelection()?.removeAllRanges();
          renderWorkspace();
        });
        document.getElementById("cancel-comment")?.addEventListener("click", () => {
          state.selectionDraft = null;
          window.getSelection()?.removeAllRanges();
          renderWorkspace();
          requestAnimationFrame(() => document.getElementById("document")?.focus({ preventScroll: true }));
        });
        function saveCurrentComment() {
          const body = document.getElementById("comment-body")?.value || "";
          if (!body.trim()) {
            state.selectionDraft.error = "Enter a comment before saving.";
            renderWorkspace();
            requestAnimationFrame(() => document.getElementById("comment-body")?.focus());
            return;
          }
          const comment = createComment(state.selectionDraft, body);
          state.comments.push(comment);
          state.activeCommentId = comment.id;
          state.selectionDraft = null;
          window.getSelection()?.removeAllRanges();
          renderWorkspace();
          requestAnimationFrame(() => document.querySelector(`[data-comment-id="${CSS.escape(comment.id)}"]`)?.focus());
        }
        document.getElementById("save-comment")?.addEventListener("click", saveCurrentComment);
        document.getElementById("comment-body")?.addEventListener("keydown", (event) => {
          if (event.key === "Enter" && (event.ctrlKey || event.metaKey)) {
            event.preventDefault();
            saveCurrentComment();
          }
        });
      }

      function renderExportModal() {
        if (!state.exportModalOpen) return "";
        const shareUrl = createShareUrl(state.exportPayload);
        return `
          <div class="modal-backdrop" id="export-backdrop">
            <section class="export-dialog" role="dialog" aria-modal="true" aria-labelledby="export-title" aria-describedby="export-warning">
              <div class="dialog-header">
                <div>
                  <h2 id="export-title">Export review payload</h2>
                  <p class="lede">Copy this base64 text to preserve or share the review.</p>
                </div>
                <button class="secondary" id="close-export" type="button" aria-label="Close export dialog">CLOSE</button>
              </div>
              <p class="export-warning" id="export-warning">Export is the only persistence mechanism. This session is not saved automatically.</p>
              <label class="checkbox-row" for="comments-only-export">
                <input id="comments-only-export" type="checkbox" ${state.exportMode === "comments-only" ? "checked" : ""}>
                <span>Comments only</span>
              </label>
              <p class="hint">${state.exportMode === "comments-only" ? "Comments-only export excludes Markdown and includes a SHA-256 hash of this document." : "Full export includes Markdown and comments."}</p>
              <label class="label-row" for="export-payload"><span>Export payload</span></label>
              <textarea class="export-textarea" id="export-payload" readonly spellcheck="false">${escapeHtml(state.exportPayload)}</textarea>
              <div class="copy-status" aria-live="polite">${escapeHtml(state.exportCopyStatus)}</div>
              ${shareUrl ? `
                <div class="share-url-section">
                  <p class="export-warning">Share URL contains the selected export payload. A full URL contains the full Markdown and comments; comments-only URLs include comment text, previews, authors, timestamps, offsets, and the Markdown hash. It may be exposed through browser history, logs, or anyone with the link.</p>
                  <label class="label-row" for="export-share-url"><span>Share URL</span></label>
                  <input class="text-input" id="export-share-url" readonly value="${escapeHtml(shareUrl)}">
                  <div class="copy-status" aria-live="polite">${escapeHtml(state.exportUrlCopyStatus)}</div>
                </div>
              ` : `
                <p class="export-warning">Share URL export is available only when this file is deployed on an http or https page. Local file sessions should copy the raw payload above.</p>
              `}
              <div class="composer-actions">
                <button class="secondary" id="select-export" type="button">SELECT_ALL</button>
                ${shareUrl ? `<button class="secondary" id="copy-url" type="button">COPY_URL</button>` : ""}
                <button class="primary" id="copy-export" type="button">COPY_PAYLOAD</button>
              </div>
            </section>
          </div>
        `;
      }

      function renderWorkspace() {
        applyTheme(state.theme);
        const commentCount = state.comments.length;
        app.innerHTML = `
          <div class="workspace">
            <header class="topbar">
              <div class="topbar-title">
                <h1 id="workspace-title">Review Workspace</h1>
                <p class="lede">Loaded for ${escapeHtml(state.author)}.</p>
              </div>
              <div class="toolbar-actions" aria-label="Workspace actions">
                <button class="secondary" id="theme-toggle" type="button" aria-label="Switch to ${state.theme === "dark" ? "light" : "dark"} theme" aria-pressed="${state.theme === "dark"}">${state.theme === "dark" ? "LIGHT" : "DARK"}</button>
                <button class="secondary mobile-only" id="comments-toggle" type="button" aria-expanded="${state.commentsDrawerOpen}" aria-controls="comments-rail">COMMENTS</button>
                <button class="secondary" id="export-button" type="button">EXPORT</button>
              </div>
            </header>
            <main class="workspace-grid" aria-labelledby="workspace-title">
              <section class="document-shell" aria-label="Markdown document panel">
                <div class="document" id="document-wrap">
                  ${renderSelectionUi()}
                  <article id="document" tabindex="-1" aria-label="Rendered Markdown Document"></article>
                </div>
              </section>
              <aside class="comments-rail" id="comments-rail" aria-label="Review comments" data-open="${state.commentsDrawerOpen}">
                <div class="rail-header">
                  <h2>Comments</h2>
                  <span class="badge">${commentCount}</span>
                </div>
                ${renderComments()}
              </aside>
            </main>
            ${renderExportModal()}
          </div>
        `;

        document.getElementById("document").append(renderMarkdown(state.markdown, state.comments));
        document.getElementById("theme-toggle").addEventListener("click", toggleTheme);
        document.querySelectorAll(".table-scroll-toggle").forEach((button) => {
          button.addEventListener("click", () => {
            const tableId = button.dataset.tableId;
            state.tableScroll[tableId] = !state.tableScroll[tableId];
            renderWorkspace();
          });
        });
        document.getElementById("export-button").addEventListener("click", openExportModal);
        bindCommentInteractions();
        const commentsToggle = document.getElementById("comments-toggle");
        if (commentsToggle) {
          commentsToggle.addEventListener("click", () => {
            state.commentsDrawerOpen = !state.commentsDrawerOpen;
            renderWorkspace();
          });
        }
        document.getElementById("close-export")?.addEventListener("click", closeExportModal);
        document.getElementById("copy-export")?.addEventListener("click", copyExportPayload);
        document.getElementById("copy-url")?.addEventListener("click", copyShareUrl);
        document.getElementById("comments-only-export")?.addEventListener("change", async (event) => {
          state.exportMode = event.target.checked ? "comments-only" : "full";
          state.exportCopyStatus = "";
          state.exportUrlCopyStatus = "";
          await refreshExportPayload();
          renderWorkspace();
        });
        document.getElementById("select-export")?.addEventListener("click", () => document.getElementById("export-payload")?.select());
        document.getElementById("export-backdrop")?.addEventListener("click", (event) => {
          if (event.target.id === "export-backdrop") closeExportModal();
        });
        document.removeEventListener("keydown", trapDialogFocus);
        if (state.exportModalOpen) {
          document.addEventListener("keydown", trapDialogFocus);
        }
      }

      function renderApp() {
        if (state.route === "workspace") {
          renderWorkspace();
        } else {
          renderOnboarding();
        }
      }

      window.__markdownReviewerTest = {
        state,
        validateStart,
        decodePayload,
        encodePayload,
        buildExportData,
        computeMarkdownHash,
        validatePayloadData,
        parseMarkdown,
        renderMarkdown,
        applyTheme,
        activateComment,
        deleteComment,
        requestDeleteComment,
        cancelDeleteComment,
        requestReply,
        cancelReply,
        addReply,
        resolveComment,
        reopenComment,
        isCommentStale,
        canShareByUrl,
        createShareUrl,
        forceBothSourcesForValidation(author, fileName, payload) {
          return validateStart({ author, sourceMode: payload ? "payload" : "file", file: payload ? null : { name: fileName }, payload, includeComments: false, commentsPayload: "" });
        }
      };

      applyQueryPayloadPrefill();
      applyTheme(state.theme);
      renderApp();
    </script>
  </body>
</html>
